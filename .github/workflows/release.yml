name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            asset: hostie-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset: hostie-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            asset: hostie-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset: hostie-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build.ts --target=${{ matrix.target }}

      - name: Rename binary
        run: mv dist/hostie-${{ matrix.target }} dist/${{ matrix.asset }}

      - name: Compute checksum
        run: |
          cd dist
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'hostie-*' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/hostie-*
          fail_on_unmatched_files: true
