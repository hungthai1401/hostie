name: Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            asset: hostie-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset: hostie-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            asset: hostie-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset: hostie-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build.ts --target=${{ matrix.target }}

      - name: Rename binary
        run: mv dist/hostie-${{ matrix.target }} dist/${{ matrix.asset }}

      - name: Compute checksum
        run: |
          cd dist
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          retention-days: 7

  go-build-release:
    name: Go Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
        working-directory: go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/hostie

      - name: Compute checksum
        run: shasum -a 256 dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }} > dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7
  go-size-check:
    name: Verify Go binary size budget
    needs: go-build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: hostie-go-*
          merge-multiple: false
      - name: Check sizes
        run: |
          set -e
          FAIL=0
          echo "| Platform | Size | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for dir in artifacts/hostie-go-*; do
            name=$(basename "$dir")
            bin=$(find "$dir" -type f ! -name '*.sha256' | head -1)
            if [ -z "$bin" ]; then
              echo "::error::no binary found in $dir"; FAIL=1; continue
            fi
            size=$(stat -c%s "$bin")
            mb=$(awk "BEGIN {printf \"%.2f\", $size/1024/1024}")
            if [ "$size" -gt $((18*1024*1024)) ]; then
              echo "::error::$name = ${mb} MB > 18 MB hard ceiling"
              echo "| $name | ${mb} MB | ❌ over 18 MB (FAIL) |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=1
            elif [ "$size" -gt $((10*1024*1024)) ]; then
              echo "::warning::$name = ${mb} MB > 10 MB aspirational target"
              echo "| $name | ${mb} MB | ⚠️ over 10 MB (aspirational miss) |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "$name = ${mb} MB OK"
              echo "| $name | ${mb} MB | ✅ under 10 MB |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          exit $FAIL

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'hostie-*' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/hostie-*
          fail_on_unmatched_files: true
