name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            asset: hostie-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset: hostie-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            asset: hostie-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset: hostie-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build.ts --target=${{ matrix.target }}

      - name: Rename binary
        run: mv dist/hostie-${{ matrix.target }} dist/${{ matrix.asset }}

      - name: Compute checksum
        run: |
          cd dist
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          retention-days: 7

  go-build-release:
    name: Go Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
        working-directory: go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/hostie

      - name: Compute checksum
        run: shasum -a 256 dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }} > dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/hostie-go-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'hostie-*' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/hostie-*
          fail_on_unmatched_files: true
