name: Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            asset: hostie-bun-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset: hostie-bun-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            asset: hostie-bun-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset: hostie-bun-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build.ts --target=${{ matrix.target }}

      - name: Rename binary
        run: mv dist/hostie-${{ matrix.target }} dist/${{ matrix.asset }}

      - name: Compute checksum
        run: |
          cd dist
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          retention-days: 7

  # Artifact naming convention (Phase 2+):
  # - Bun (v1, doomed): hostie-bun-<os>-<arch> (prefixed to avoid collision during parallel-lane period)
  # - Go (v2, future): hostie-<os>-<arch> (canonical name; no cutover rename needed at Phase 5)
  # At Phase 5 cutover, Bun job + artifacts are deleted; Go artifacts remain as-is.
  go-build-release:
    name: Go Build ${{ matrix.goos }}/${{ matrix.goarch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build hostie-${{ matrix.goos }}-${{ matrix.goarch }}
        working-directory: go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p ../dist
          # Strip leading "v" so a tag "v1.0.0" produces "hostie v1.0.0", not "hostie vv1.0.0".
          # Pass via env to avoid script injection from attacker-influenced ref names.
          VERSION="${REF_NAME#v}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/hostie-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/hostie

      - name: Compute checksum
        run: shasum -a 256 dist/hostie-${{ matrix.goos }}-${{ matrix.goarch }} > dist/hostie-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: hostie-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/hostie-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/hostie-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7
  go-size-check:
    name: Verify Go binary size budget
    if: startsWith(github.ref, 'refs/tags/v')
    needs: go-build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts
          pattern: hostie-*
          merge-multiple: false
      - name: Check sizes
        run: |
          set -e
          FAIL=0
          echo "| Platform | Size | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for dir in artifacts/hostie-*; do
            name=$(basename "$dir")
            bins=("$dir"/hostie-*)
            if [ ${#bins[@]} -ne 1 ]; then
              echo "::error::expected 1 binary in $dir, got ${#bins[@]}"; FAIL=1; continue
            fi
            bin="${bins[0]}"
            size=$(wc -c <"$bin")
            mb=$(awk "BEGIN {printf \"%.2f\", $size/1024/1024}")
            if [ "$size" -gt $((18*1024*1024)) ]; then
              echo "::error::$name = ${mb} MB > 18 MB hard ceiling"
              echo "| $name | ${mb} MB | ❌ over 18 MB (FAIL) |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=1
            elif [ "$size" -gt $((10*1024*1024)) ]; then
              echo "::warning::$name = ${mb} MB > 10 MB aspirational target"
              echo "| $name | ${mb} MB | ⚠️ over 10 MB (aspirational miss) |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "$name = ${mb} MB OK"
              echo "| $name | ${mb} MB | ✅ under 10 MB |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          exit $FAIL

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, go-build-release, go-size-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'hostie-*' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/hostie-*
          fail_on_unmatched_files: true
